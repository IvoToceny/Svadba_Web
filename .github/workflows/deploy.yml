# Deploy the wedding site to GitHub Pages (free static hosting).
#
# HOW TO ENABLE (once):
#   1. Create a GitHub repo (e.g. Svadba_Web) and push this folder into it.
#   2. In the repo: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
#   3. Done. Every push to the main branch automatically builds and deploys the site
#      to https://<your-login>.github.io/<repo-name>/
#
# Until the repo exists, this file does nothing — the site runs locally via `dotnet watch`.

name: Deploy to GitHub Pages

on:
  # Automatic deployment on every push to the main branch.
  # (Requires: Public repo + Settings -> Pages -> Source = "GitHub Actions".)
  push:
    branches: [ main ]
  # Manual run from the Actions tab -> Run workflow.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enables GitHub Pages from the workflow itself (build_type = workflow),
      # so it does not depend on toggling the setting in the UI.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish SvadbaWeb/SvadbaWeb.csproj -c Release -o build

      - name: Fix base href + SPA fallback
        run: |
          REPO="${{ github.event.repository.name }}"
          sed -i "s|<base href=\"/\" />|<base href=\"/$REPO/\" />|g" build/wwwroot/index.html
          cp build/wwwroot/index.html build/wwwroot/404.html
          touch build/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
